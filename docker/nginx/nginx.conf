# Nginx配置文件
# 本文件配置了两个server块：
#   1. 后台管理系统 (admin.localhost) - 端口80
#   2. C端商城 (shop.localhost) - 端口80

# 上游服务器定义（后端服务地址）
upstream backend {
    server goshopadmin-backend:8080;
}

upstream shop-backend {
    server goshopadmin-shop-backend:8081;
}

# ============================================================================
# 后台管理系统 server块
# 域名: admin.localhost
# 功能: 管理后台的前端静态文件托管 + 后端API反向代理
# ============================================================================
server {
    listen 80;
    server_name admin.localhost;

    # 静态文件服务
    # 根目录: /usr/share/nginx/html/admin
    # 功能: 托管Vue/React等前端项目的构建产物
    # 路由: /index.html 支持Vue Router的history模式（所有未匹配路由都返回index.html）
    location / {
        root /usr/share/nginx/html/admin;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 后端API反向代理
    # 功能: 将前端请求代理到后台管理系统的Go后端服务
    # 路由: /api/* -> http://backend/api/*
    # 头信息: 传递Host、X-Real-IP、X-Forwarded-For等用于后端获取真实客户端信息
    location /api/ {
        proxy_pass http://backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # 健康检查
    # 功能: 用于Docker健康检查或负载均衡器探测
    # 路由: /health -> http://backend/health
    location /health {
        proxy_pass http://backend/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # 错误页面
    # 功能: 自定义错误页面，返回静态HTML文件
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html/admin;
    }

    # 安全配置
    # 功能: 设置HTTP安全响应头，防止常见Web攻击
    # X-Content-Type-Options: 禁止浏览器MIME类型嗅探
    # X-Frame-Options: 防止页面被iframe嵌入（防点击劫持）
    # X-XSS-Protection: 启用浏览器XSS过滤器
    # Strict-Transport-Security: 强制使用HTTPS（1年有效期，包含子域名）
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 日志配置
    # 功能: 记录访问日志和错误日志到指定文件
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # 压缩配置
    # 功能: 启用Gzip压缩，减少传输数据量，提升加载速度
    # 压缩级别: 6（平衡压缩率和CPU开销）
    # 最小压缩长度: 1024字节（小于此值不压缩）
    # 压缩类型: 文本、CSS、JSON、JavaScript、XML等常见Web资源
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;

    # 客户端请求限制
    # 功能: 限制最大请求体大小为10MB（防止大文件上传导致服务器资源耗尽）
    client_max_body_size 10M;
}

# ============================================================================
# C端商城 server块
# 域名: shop.localhost
# 功能: 商城前端静态文件托管 + 后端API反向代理 + WebSocket代理
# ============================================================================
server {
    listen 80;
    server_name shop.localhost;

    # WebSocket 代理（放在 /api/ 之前，优先匹配）
    # 功能: 代理WebSocket连接，用于实时消息推送（如订单状态通知）
    # 路由: /ws -> http://shop-backend/ws
    # 特殊头: Upgrade和Connection用于WebSocket协议升级
    # 超时: 86400秒（24小时），长连接保持
    location /ws {
        proxy_pass http://shop-backend/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # 静态文件服务
    # 功能: 托管C端商城前端项目的构建产物
    location / {
        root /usr/share/nginx/html/shop;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 后端API反向代理
    # 功能: 将前端请求代理到C端商城的Go后端服务
    location /api/ {
        proxy_pass http://shop-backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # 健康检查
    # 功能: Docker健康检查或负载均衡器探测
    location /health {
        proxy_pass http://shop-backend/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # 错误页面
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html/shop;
    }

    # 安全配置（同后台管理系统）
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 日志配置
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # 压缩配置
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;

    # 客户端请求限制
    client_max_body_size 10M;
}
